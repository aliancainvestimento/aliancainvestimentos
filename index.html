<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aliança Investimentos & Consórcios</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-dark: #020617;
            --primary-blue: #1e40af;
            --accent-blue: #3b82f6;
            --silver: #cbd5e1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden; /* Mantém o efeito de "página única" */
        }

        /* NAVEGAÇÃO POR PÁGINAS */
        .page {
            display: none; /* Esconde todas as páginas por padrão */
            height: 100vh;
            width: 100%;
            padding: 40px 20px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: absolute;
            top: 0;
            left: 0;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }

        .active { display: flex; animation: fadeIn 0.5s; } /* Mostra a página ativa */

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* HEADER FIXO COM LOGO */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px;
            z-index: 100;
            text-align: center;
        }

        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 28px;
            letter-spacing: 5px;
            color: #fff;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .logo-sub {
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--accent-blue);
            text-transform: uppercase;
        }

        /* MENU DE PÁGINAS (BOTÕES) */
        .menu-nav {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--accent-blue);
            color: #fff;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .nav-btn:hover, .nav-btn.active-btn {
            background: var(--accent-blue);
            box-shadow: 0 0 15px var(--accent-blue);
        }

        /* CONTEÚDO DAS PÁGINAS */
        .content-box {
            max-width: 600px;
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            margin-top: 80px;
        }

        h2 { font-family: 'Montserrat', sans-serif; margin-bottom: 15px; color: var(--accent-blue); }

        /* SIMULADOR */
        .simulator {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            text-align: left;
        }

        .sim-row { margin-bottom: 15px; }
        .sim-row label { display: block; font-size: 11px; color: var(--silver); margin-bottom: 5px; }
        .sim-row input { width: 100%; accent-color: var(--accent-blue); }

        .result { border-top: 1px solid #334155; padding-top: 15px; text-align: center; }
        .result strong { font-size: 32px; display: block; }
